<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="shortcut icon" type="image/png" href="%PUBLIC_URL%/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    <meta name="theme-color" content="#047857" />
    <meta
      name="description"
      content="PVARA - Pakistan Virtual Asset Regulatory Authority | Official Recruitment Portal"
    />
    <link rel="apple-touch-icon" href="https://recruitment.pvara.team/pvara-logo.png" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://recruitment.pvara.team/" />
    <meta property="og:title" content="PVARA Recruitment Portal - Pakistan Virtual Asset Regulatory Authority" />
    <meta property="og:description" content="Apply for positions at PVARA - Pakistan's Virtual Asset Regulatory Authority. Join our team of experts in financial regulation, cybersecurity, policy, and technology." />
    <meta property="og:image" content="https://recruitment.pvara.team/pvara-logo.png" />
    <meta property="og:site_name" content="PVARA Recruitment" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://recruitment.pvara.team/" />
    <meta property="twitter:title" content="PVARA Recruitment Portal" />
    <meta property="twitter:description" content="Apply for positions at PVARA - Pakistan's Virtual Asset Regulatory Authority." />
    <meta property="twitter:image" content="https://recruitment.pvara.team/pvara-logo.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Google Fonts - Plus Jakarta Sans (closest to Aeonik) + Inter fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons CDN -->
    <script defer src="https://unpkg.com/lucide@0.460.0"></script>
    
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>PVARA Recruitment Portal</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
